<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Control — Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #0B1E3D;
            background-image:
                    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(61,90,254,.35) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(26,111,212,.25) 0%, transparent 60%);
            overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 48px 48px; pointer-events: none;
        }

        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,.04); backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,.10); border-radius: 20px;
            padding: 48px 44px; width: 420px;
            box-shadow: 0 0 0 1px rgba(61,90,254,.15), 0 32px 80px rgba(0,0,0,.5);
            animation: fadeUp .4s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px) scale(.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
        .brand-icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, #3D5AFE, #1A6FD4);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; color: white;
            box-shadow: 0 4px 16px rgba(61,90,254,.4); letter-spacing: .04em;
        }
        .brand-text h1 { color: white; font-size: 22px; font-weight: 700; line-height: 1.1; }
        .brand-text p  { color: rgba(255,255,255,.5); font-size: 12px; margin-top: 3px; }

        .subtitle { color: rgba(255,255,255,.6); font-size: 13.5px; line-height: 1.55; margin-bottom: 32px; }

        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 10px; font-weight: 700;
            color: rgba(255,255,255,.5); text-transform: uppercase;
            letter-spacing: .10em; margin-bottom: 8px;
        }
        .field input {
            width: 100%; background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.10); border-radius: 10px;
            padding: 12px 16px; font-family: 'DM Sans', sans-serif;
            font-size: 14px; color: white; outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .field input::placeholder { color: rgba(255,255,255,.25); }
        .field input:focus {
            border-color: rgba(61,90,254,.7);
            box-shadow: 0 0 0 3px rgba(61,90,254,.2);
        }

        .error-msg {
            font-size: 12px; color: #FF6B6B; margin-bottom: 16px;
            padding: 8px 12px; background: rgba(232,72,85,.12);
            border: 1px solid rgba(232,72,85,.25); border-radius: 8px; display: none;
        }
        .error-msg.visible { display: block; }

        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #3D5AFE, #1A6FD4);
            border: none; border-radius: 10px; color: white;
            font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 8px; transition: all .15s;
            box-shadow: 0 4px 20px rgba(61,90,254,.4);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(61,90,254,.5); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: .7; cursor: not-allowed; transform: none; }

        .submit-btn img { width: 16px; height: 16px; filter: brightness(0) invert(1); }

        .footer-note { text-align: center; color: rgba(255,255,255,.25); font-size: 11px; margin-top: 28px; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-icon">D&amp;D</div>
        <div class="brand-text">
            <h1>D&amp;D Control</h1>
            <p>Panel de Administración</p>
        </div>
    </div>

    <p class="subtitle">Accede con tus credenciales de administrador para gestionar el control horario.</p>

    <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="admin@empresa.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <p class="error-msg" id="errorMsg"></p>

    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        Iniciar sesión
        <img src="icons/arrow-right-svgrepo-com.svg" alt="">
    </button>

    <p class="footer-note">D&amp;D Control v1.0 · Solo personal autorizado</p>
</div>

<script src="shared.js"></script>
<script>
    if (sessionStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    const BTN_LABEL = `Iniciar sesión <img src="icons/arrow-right-svgrepo-com.svg" alt="" style="width:16px;height:16px;filter:brightness(0) invert(1);vertical-align:middle">`;

    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const pass  = document.getElementById('password').value;
        const err   = document.getElementById('errorMsg');
        const btn   = document.getElementById('loginBtn');

        err.classList.remove('visible');

        if (!email || !pass) {
            err.textContent = 'Completa todos los campos.';
            err.classList.add('visible');
            return;
        }

        btn.innerHTML = 'Accediendo…';
        btn.disabled  = true;

        try {
            const res = await fetch(`${API}/auth/login`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password: pass })
            });

            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                err.textContent = errData.mensaje || errData.message || 'Credenciales incorrectas.';
                err.classList.add('visible');
                btn.innerHTML = BTN_LABEL;
                btn.disabled  = false;
                return;
            }

            const data = await res.json();
            console.log('Respuesta login completa:', data);
            console.log('Token recibido:', data.token);

            sessionStorage.setItem('token',     data.token);
            sessionStorage.setItem('userId',    data.idUsuario);
            sessionStorage.setItem('empresaId', data.idEmpresa);
            sessionStorage.setItem('nombre',    `${data.nombre} ${data.apellidos}`);
            sessionStorage.setItem('rol',       data.rol);

            window.location.href = 'dashboard.html';

        } catch {
            err.textContent = 'Error de conexión con el servidor.';
            err.classList.add('visible');
            btn.innerHTML = BTN_LABEL;
            btn.disabled  = false;
        }
    }

    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
