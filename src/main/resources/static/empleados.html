<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados — D&D Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body data-page="empleados">
<div class="app">
    <nav class="sidebar">
        <div class="brand"><div class="brand-icon">DD</div><span class="brand-name">D&D Control</span></div>
        <div class="nav-section"><span class="nav-label" data-i18n="nav.principal">Principal</span>
            <a class="nav-item" data-page="dashboard"   href="dashboard.html"><img src="icons/dashboard-svgrepo-com.svg" alt=""><span data-i18n="nav.dashboard">Dashboard</span></a>
            <a class="nav-item" data-page="fichajes"    href="fichajes.html"><img src="icons/clock-two-svgrepo-com.svg" alt=""><span data-i18n="nav.fichajes">Fichajes</span></a>
            <a class="nav-item" data-page="solicitudes" href="solicitudes.html"><img src="icons/paper-svgrepo-com.svg" alt=""><span data-i18n="nav.solicitudes">Solicitudes</span><span class="nav-badge">4</span></a>
            <a class="nav-item" data-page="incidencias" href="incidencias.html"><img src="icons/warning-1-svgrepo-com.svg" alt=""><span data-i18n="nav.incidencias">Incidencias</span><span class="nav-badge">2</span></a>
        </div>
        <div class="nav-section"><span class="nav-label" data-i18n="nav.gestion">Gestión</span>
            <a class="nav-item" data-page="empleados"   href="empleados.html"><img src="icons/employees-svgrepo-com (1).svg" alt=""><span data-i18n="nav.empleados">Empleados</span></a>
            <a class="nav-item" data-page="sedes"       href="sedes.html"><img src="icons/headquarters-building-bank-house-svgrepo-com.svg" alt=""><span data-i18n="nav.sedes">Sedes</span></a>
            <a class="nav-item" data-page="turnos"      href="turnos.html"><img src="icons/shifts-team-svgrepo-com.svg" alt=""><span data-i18n="nav.turnos">Turnos</span></a>
            <a class="nav-item" data-page="informes"    href="informes.html"><img src="icons/reports-svgrepo-com.svg" alt=""><span data-i18n="nav.informes">Informes</span></a>
        </div>
        <div class="nav-section"><span class="nav-label" data-i18n="nav.sistema">Sistema</span>
            <a class="nav-item" data-page="configuracion" href="configuracion.html"><img src="icons/settings-svgrepo-com.svg" alt=""><span data-i18n="nav.configuracion">Configuración</span></a>
        </div>
        <div class="sidebar-spacer"></div>
        <div class="user-chip">
            <div class="avatar">AC</div>
            <div class="user-info"><div class="user-name">Admin Central</div><div class="user-role">Administrador</div></div>
            <div class="btn-icon" onclick="doLogout()"><img src="icons/logout-svgrepo-com.svg" alt="Cerrar sesión"></div>
        </div>
    </nav>
    <main>
        <div class="topbar">
            <h1 data-i18n="empleados.titulo">Empleados</h1>
            <div class="topbar-spacer"></div>
            <select id="filtroRol"><option value="" data-i18n="empleados.todos_roles">Todos los roles</option><option>Empleado</option><option>Supervisor</option><option>Admin</option></select>
            <select id="filtroSede"><option value="" data-i18n="empleados.todas_sedes">Todas las sedes</option></select>
            <button class="btn btn-primary" onclick="openModal('modal-empleado')" data-i18n="empleados.nuevo">+ Nuevo empleado</button>
        </div>
        <div style="flex:1;overflow-y:auto;background:white">
            <table id="empleadosTable">
                <thead><tr>
                    <th data-i18n="empleados.col_empleado">Empleado</th>
                    <th data-i18n="empleados.col_depto">Departamento</th>
                    <th data-i18n="empleados.col_sede">Sede(s)</th>
                    <th data-i18n="empleados.col_turno">Turno</th>
                    <th data-i18n="empleados.col_estado">Estado</th>
                    <th data-i18n="empleados.col_ult">Último fichaje</th>
                    <th data-i18n="empleados.col_acc">Acciones</th>
                </tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>
<div class="modal-overlay" id="modal-empleado">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-emp-title" data-i18n="empleados.modal_titulo">Nuevo empleado</span>
            <button class="modal-close" onclick="closeModal('modal-empleado')">×</button>
        </div>
        <div class="modal-body">
            <div class="form-grid form-2col">
                <div class="field"><label data-i18n="empleados.nombre">Nombre</label><input type="text" id="empNombre" placeholder="Nombre"></div>
                <div class="field"><label data-i18n="empleados.apellidos">Apellidos</label><input type="text" id="empApellidos" placeholder="Apellidos"></div>
                <div class="field form-full"><label data-i18n="empleados.email">Email</label><input type="email" id="empEmail" placeholder="empleado@empresa.com"></div>
                <div class="field"><label data-i18n="empleados.password">Contraseña</label><input type="password" id="empPass" placeholder="••••••••"></div>
                <div class="field"><label data-i18n="empleados.telefono">Teléfono</label><input type="tel" id="empTel" placeholder="600000000"></div>
                <div class="field"><label data-i18n="empleados.rol">Rol</label><select id="empRol"><option>Empleado</option><option>Supervisor</option><option>Admin</option></select></div>
                <div class="field"><label data-i18n="empleados.tipo">Tipo empleado</label><select id="empTipo"><option>Jornada completa</option><option>Media jornada</option><option>Externo</option></select></div>
                <div class="field"><label data-i18n="empleados.sede">Sede</label><select id="empSede"></select></div>
                <div class="field"><label data-i18n="empleados.depto">Departamento</label><input type="text" id="empDepto" placeholder="Ej: Ventas"></div>
                <div class="field"><label data-i18n="empleados.turno">Turno</label><select id="empTurno"></select></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modal-empleado')" data-i18n="empleados.cancelar">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarEmpleado()" data-i18n="empleados.crear">Crear empleado</button>
        </div>
    </div>
</div>
<script src="i18n.js"></script>
<script src="shared.js"></script>
<script src="empleados.js"></script>
</body>
</html>
