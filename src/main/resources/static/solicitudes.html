<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes — D&D Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body data-page="solicitudes">
<div class="app">
    <nav class="sidebar">
        <div class="brand"><div class="brand-icon">DD</div><span class="brand-name">D&D Control</span></div>
        <div class="nav-section"><span class="nav-label">Principal</span>
            <a class="nav-item" data-page="dashboard"   href="dashboard.html"><img src="icons/dashboard-svgrepo-com.svg" alt="Dashboard">Dashboard</a>
            <a class="nav-item" data-page="fichajes"    href="fichajes.html"><img src="icons/clock-two-svgrepo-com.svg" alt="Fichajes">Fichajes</a>
            <a class="nav-item" data-page="solicitudes" href="solicitudes.html"><img src="icons/paper-svgrepo-com.svg" alt="Solicitudes">Solicitudes<span class="nav-badge">4</span></a>
            <a class="nav-item" data-page="incidencias" href="incidencias.html"><img src="icons/warning-1-svgrepo-com.svg" alt="Incidencias">Incidencias<span class="nav-badge">2</span></a>
        </div>
        <div class="nav-section"><span class="nav-label">Gestión</span>
            <a class="nav-item" data-page="empleados"   href="empleados.html"><img src="icons/employees-svgrepo-com (1).svg" alt="Empleados">Empleados</a>
            <a class="nav-item" data-page="sedes"       href="sedes.html"><img src="icons/headquarters-building-bank-house-svgrepo-com.svg" alt="Sedes">Sedes</a>
            <a class="nav-item" data-page="turnos"      href="turnos.html"><img src="icons/shifts-team-svgrepo-com.svg" alt="Turnos">Turnos</a>
            <a class="nav-item" data-page="informes"    href="informes.html"><img src="icons/reports-svgrepo-com.svg" alt="Informes">Informes</a>
        </div>
        <div class="nav-section"><span class="nav-label">Sistema</span>
            <a class="nav-item" data-page="configuracion" href="configuracion.html"><img src="icons/settings-svgrepo-com.svg" alt="Configuración">Configuración</a>
        </div>
        <div class="sidebar-spacer"></div>
        <div class="user-chip">
            <div class="avatar">AC</div>
            <div class="user-info"><div class="user-name">Admin Central</div><div class="user-role">Administrador</div></div>
            <div class="btn-icon" onclick="doLogout()"><img src="icons/logout-svgrepo-com.svg" alt="Cerrar sesión"></div>
        </div>
    </nav>

    <main>
        <div class="topbar"><h1>Solicitudes</h1></div>

        <div class="tabs-bar">
            <div class="tab active" onclick="filterEstado('pendiente', this)">Pendientes <span id="cnt-pendiente">(4)</span></div>
            <div class="tab" onclick="filterEstado('aprobada', this)">Aprobadas</div>
            <div class="tab" onclick="filterEstado('denegada', this)">Rechazadas</div>
            <div class="tab" onclick="filterEstado('', this)">Todas</div>
        </div>

        <div style="flex:1;overflow-y:auto;background:white">
            <table id="solicitudesTable">
                <thead><tr>
                    <th>Empleado</th><th>Tipo</th><th>Período</th><th>Motivo</th>
                    <th>Fecha solicitud</th><th>Justificante</th><th>Acciones</th>
                </tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modal-resolucion">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-res-title">Resolver solicitud</span>
            <button class="modal-close" onclick="closeModal('modal-resolucion')">×</button>
        </div>
        <div class="modal-body">
            <div class="field">
                <label>Comentario para el empleado (opcional)</label>
                <textarea id="comentarioAdmin" placeholder="Escribe un comentario…"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modal-resolucion')">Cancelar</button>
            <button class="btn btn-primary" id="btnConfirmarResolucion">Confirmar</button>
        </div>
    </div>
</div>

<script src="shared.js"></script>
<script src="solicitudes.js"></script>
</body>
</html>
