<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos — D&D Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .turnos-layout { display:flex; gap:20px; align-items:flex-start; }
        .turnos-table { flex:1; min-width:0; }
        .turnos-form  { width:300px; flex-shrink:0; }
        .day-toggles  { display:flex; gap:6px; }
        .day-btn { width:34px; height:34px; border-radius:var(--radius-sm); border:none; font-family:var(--font); font-size:13px; font-weight:700; cursor:pointer; transition:all var(--transition); }
        .day-on  { background:var(--blue); color:white; }
        .day-off { background:var(--blue-light); color:var(--text-muted); }
    </style>
</head>
<body data-page="turnos">
<div class="app">
    <nav class="sidebar">
        <div class="brand"><div class="brand-icon">DD</div><span class="brand-name">D&D Control</span></div>
        <div class="nav-section"><span class="nav-label" data-i18n="nav.principal">Principal</span>
            <a class="nav-item" data-page="dashboard"   href="dashboard.html"><img src="icons/dashboard-svgrepo-com.svg" alt=""><span data-i18n="nav.dashboard">Dashboard</span></a>
            <a class="nav-item" data-page="fichajes"    href="fichajes.html"><img src="icons/clock-two-svgrepo-com.svg" alt=""><span data-i18n="nav.fichajes">Fichajes</span></a>
            <a class="nav-item" data-page="solicitudes" href="solicitudes.html"><img src="icons/paper-svgrepo-com.svg" alt=""><span data-i18n="nav.solicitudes">Solicitudes</span><span class="nav-badge">4</span></a>
            <a class="nav-item" data-page="incidencias" href="incidencias.html"><img src="icons/warning-1-svgrepo-com.svg" alt=""><span data-i18n="nav.incidencias">Incidencias</span><span class="nav-badge">2</span></a>
        </div>
        <div class="nav-section"><span class="nav-label" data-i18n="nav.gestion">Gestión</span>
            <a class="nav-item" data-page="empleados"   href="empleados.html"><img src="icons/employees-svgrepo-com (1).svg" alt=""><span data-i18n="nav.empleados">Empleados</span></a>
            <a class="nav-item" data-page="sedes"       href="sedes.html"><img src="icons/headquarters-building-bank-house-svgrepo-com.svg" alt=""><span data-i18n="nav.sedes">Sedes</span></a>
            <a class="nav-item" data-page="turnos"      href="turnos.html"><img src="icons/shifts-team-svgrepo-com.svg" alt=""><span data-i18n="nav.turnos">Turnos</span></a>
            <a class="nav-item" data-page="informes"    href="informes.html"><img src="icons/reports-svgrepo-com.svg" alt=""><span data-i18n="nav.informes">Informes</span></a>
        </div>
        <div class="nav-section"><span class="nav-label" data-i18n="nav.sistema">Sistema</span>
            <a class="nav-item" data-page="configuracion" href="configuracion.html"><img src="icons/settings-svgrepo-com.svg" alt=""><span data-i18n="nav.configuracion">Configuración</span></a>
        </div>
        <div class="sidebar-spacer"></div>
        <div class="user-chip">
            <div class="avatar">AC</div>
            <div class="user-info"><div class="user-name">Admin Central</div><div class="user-role">Administrador</div></div>
            <div class="btn-icon" onclick="doLogout()"><img src="icons/logout-svgrepo-com.svg" alt="Cerrar sesión"></div>
        </div>
    </nav>
    <main>
        <div class="topbar"><h1 data-i18n="turnos.titulo">Turnos y Horarios</h1></div>
        <div class="scroll-body page-enter">
            <div class="turnos-layout">
                <div class="turnos-table card">
                    <div class="card-header"><span class="card-title" data-i18n="turnos.definidos">Turnos definidos</span></div>
                    <div class="table-wrap">
                        <table id="turnosTable">
                            <thead><tr>
                                <th data-i18n="turnos.col_nombre">Nombre</th>
                                <th data-i18n="turnos.col_entrada">Entrada</th>
                                <th data-i18n="turnos.col_salida">Salida</th>
                                <th data-i18n="turnos.col_dias">Días</th>
                                <th data-i18n="turnos.col_emp">Empleados</th>
                                <th data-i18n="turnos.col_acc">Acciones</th>
                            </tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                <div class="turnos-form card">
                    <div class="card-header"><span class="card-title" id="form-title" data-i18n="turnos.nuevo">Nuevo turno</span></div>
                    <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
                        <input type="hidden" id="turnoId">
                        <div class="field"><label data-i18n="turnos.campo_nombre">Nombre del turno</label><input type="text" id="turnoNombre" placeholder="Ej: Mañana L-V"></div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                            <div class="field"><label data-i18n="turnos.campo_ent">Hora entrada</label><input type="time" id="turnoEntrada" value="08:00"></div>
                            <div class="field"><label data-i18n="turnos.campo_sal">Hora salida</label><input type="time" id="turnoSalida" value="16:00"></div>
                        </div>
                        <div class="field" style="gap:8px">
                            <label data-i18n="turnos.dias_sem">Días de la semana</label>
                            <div class="day-toggles">
                                <button class="day-btn day-on"  data-day="L" onclick="toggleDay(this)">L</button>
                                <button class="day-btn day-on"  data-day="M" onclick="toggleDay(this)">M</button>
                                <button class="day-btn day-on"  data-day="X" onclick="toggleDay(this)">X</button>
                                <button class="day-btn day-on"  data-day="J" onclick="toggleDay(this)">J</button>
                                <button class="day-btn day-on"  data-day="V" onclick="toggleDay(this)">V</button>
                                <button class="day-btn day-off" data-day="S" onclick="toggleDay(this)">S</button>
                                <button class="day-btn day-off" data-day="D" onclick="toggleDay(this)">D</button>
                            </div>
                        </div>
                        <div class="field"><label data-i18n="turnos.desc">Descripción (opcional)</label><textarea id="turnoDesc" placeholder="Descripción del turno…"></textarea></div>
                        <div style="display:flex;gap:10px">
                            <button class="btn btn-secondary" style="flex:1" onclick="resetForm()" data-i18n="turnos.cancelar">Cancelar</button>
                            <button class="btn btn-primary"   style="flex:1" onclick="guardarTurno()" data-i18n="turnos.guardar">Guardar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="i18n.js"></script>
<script src="shared.js"></script>
<script src="turnos.js"></script>
<div class="modal-overlay" id="modal-asignar">
    <div class="modal" style="max-width:480px">
        <div class="modal-header">
            <span class="modal-title">Asignar empleados — <span id="asignar-turno-nombre"></span></span>
            <button class="modal-close" onclick="closeModal('modal-asignar')">×</button>
        </div>
        <div class="modal-body" style="max-height:400px;overflow-y:auto">
            <div id="asignar-lista" style="display:flex;flex-direction:column;gap:8px"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modal-asignar')">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmarAsignacion()">Guardar asignación</button>
        </div>
    </div>
</div>
</body>
</html>
